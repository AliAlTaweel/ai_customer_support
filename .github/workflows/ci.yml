name: AI Agent Evaluation & CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: luxe_support
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend & Prisma Dependencies
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit --no-fund

      - name: Run Prisma Database Push & Seeding
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/luxe_support
        run: |
          cd frontend
          npx prisma generate
          npx prisma db push --accept-data-loss
          npx prisma db seed

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Spacy PII Engine Model
        run: |
          python -m spacy download en_core_web_sm

      - name: Run Evaluation Agent Suite
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/luxe_support
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MANAGER_MODEL: gemini/gemini-1.5-flash
          WORKER_MODEL: gemini/gemini-1.5-flash
          EMBEDDING_MODEL: models/text-embedding-004
          INDEX_SAVE_PATH: /tmp/faq_index
          CLERK_JWKS_URL: https://still-weasel-52.clerk.accounts.dev/.well-known/jwks.json
          CLERK_ISSUER: https://still-weasel-52.clerk.accounts.dev
        run: |
          cd backend
          python evals/eval_agent.py
