version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - |
              if [ -n "$AWS_COMMIT_ID" ]; then
                CHANGES=$(git diff --name-only $AWS_COMMIT_ID^ $AWS_COMMIT_ID)
                if ! echo "$CHANGES" | grep -E "^(frontend/|amplify.yml|package.json)"; then
                  echo "No frontend changes detected. Skipping build."
                  exit 0
                fi
              fi
            - npm ci
        build:
          commands:
            - npx prisma generate
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
