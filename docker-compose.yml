version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: luxe_user
      POSTGRES_PASSWORD: luxe_password
      POSTGRES_DB: luxe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
